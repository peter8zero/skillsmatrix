<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Calc Services — Skills Matrix</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --xps-blue: #4a9fd9;
                --xps-blue-light: #6bb3e3;
                --xps-blue-dark: #3b8ac4;
                --xps-charcoal: #2d3539;
                --xps-charcoal-light: #3d474c;
                --xps-charcoal-dark: #1e2528;
                --xps-dark-bg: #161b1e;
                --xps-card-bg: #232a2e;
                --xps-text: #f0f2f3;
                --xps-text-muted: #8a9499;
                --xps-border: rgba(255, 255, 255, 0.1);
                --xps-success: #4caf50;
                --xps-warning: #ff9800;
                --xps-danger: #f44336;
                --xps-purple: #9c27b0;
                --xps-accent: #26c6da;
                --level-1: #5c6bc0;
                --level-2: #26a69a;
                --level-3: #ff9800;
                --level-4: #ef5350;
            }

            [data-theme="light"] {
                --xps-charcoal: #e8eaec;
                --xps-charcoal-light: #f5f6f7;
                --xps-charcoal-dark: #d0d4d8;
                --xps-dark-bg: #f0f2f4;
                --xps-card-bg: #ffffff;
                --xps-text: #1e2528;
                --xps-text-muted: #5a6469;
                --xps-border: rgba(0, 0, 0, 0.1);
            }

            html {
                scrollbar-gutter: stable;
                overflow-x: hidden;
            }

            body {
                font-family:
                    "Segoe UI",
                    -apple-system,
                    BlinkMacSystemFont,
                    Roboto,
                    Oxygen,
                    Ubuntu,
                    sans-serif;
                background: var(--xps-dark-bg);
                min-height: 100vh;
                color: var(--xps-text);
                line-height: 1.5;
            }

            /* ─── HEADER ─── */
            .header-bar {
                background: var(--xps-charcoal);
                padding: 14px 24px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                border-bottom: 3px solid var(--xps-blue);
                position: sticky;
                top: 0;
                z-index: 100;
            }
            .logo-container {
                display: flex;
                align-items: baseline;
                gap: 16px;
            }
            .logo-container svg {
                height: 36px;
                width: auto;
                align-self: center;
            }
            .logo-text {
                font-size: 1.4rem;
                font-weight: 400;
                color: var(--xps-text);
                letter-spacing: -0.5px;
            }
            .logo-text strong {
                font-weight: 700;
            }
            .logo-divider {
                width: 1px;
                height: 24px;
                background: var(--xps-border);
                align-self: center;
            }
            .app-title {
                font-size: 1.1rem;
                font-weight: 300;
                color: var(--xps-text-muted);
            }
            .header-actions {
                display: flex;
                gap: 8px;
                align-items: center;
            }
            .header-btn {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 8px 14px;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid var(--xps-border);
                border-radius: 6px;
                color: var(--xps-text-muted);
                font-size: 0.85rem;
                cursor: pointer;
                transition: all 0.2s;
            }
            .header-btn:hover {
                color: var(--xps-blue);
                background: rgba(74, 159, 217, 0.15);
                border-color: var(--xps-blue);
            }
            .header-btn.danger:hover {
                color: var(--xps-danger);
                background: rgba(244, 67, 54, 0.15);
                border-color: var(--xps-danger);
            }
            .profile-toggle {
                display: flex;
                background: rgba(0, 0, 0, 0.2);
                border-radius: 6px;
                padding: 3px;
                gap: 2px;
            }
            .profile-toggle button {
                padding: 6px 12px;
                border: none;
                background: transparent;
                color: var(--xps-text-muted);
                font-size: 0.8rem;
                font-weight: 500;
                border-radius: 4px;
                cursor: pointer;
                transition: all 0.2s;
            }
            .profile-toggle button:hover {
                color: var(--xps-text);
            }
            .profile-toggle button.active {
                background: var(--xps-blue);
                color: #fff;
            }
            .theme-toggle {
                display: flex;
                background: rgba(0, 0, 0, 0.2);
                border-radius: 6px;
                padding: 3px;
                gap: 2px;
            }
            .theme-toggle button {
                padding: 6px 12px;
                border: none;
                background: transparent;
                color: var(--xps-text-muted);
                font-size: 0.8rem;
                font-weight: 500;
                border-radius: 4px;
                cursor: pointer;
                transition: all 0.2s;
            }
            .theme-toggle button:hover {
                color: var(--xps-text);
            }
            .theme-toggle button.active {
                background: var(--xps-blue);
                color: #fff;
            }

            /* ─── LAYOUT ─── */
            .app-container {
                max-width: 100%;
                padding: 24px;
                display: flex;
                flex-direction: column;
                gap: 24px;
                height: calc(100vh - 67px);
            }

            /* ─── TOOLBAR ─── */
            .toolbar {
                display: flex;
                align-items: center;
                gap: 12px;
                flex-wrap: wrap;
            }
            .toolbar input {
                padding: 8px 14px;
                background: var(--xps-card-bg);
                border: 1px solid var(--xps-border);
                border-radius: 6px;
                color: var(--xps-text);
                font-size: 0.9rem;
                width: 220px;
            }
            .toolbar input::placeholder {
                color: var(--xps-text-muted);
            }
            .toolbar input:focus {
                outline: none;
                border-color: var(--xps-blue);
            }
            .btn-add {
                padding: 8px 16px;
                background: var(--xps-blue);
                border: none;
                border-radius: 6px;
                color: #fff;
                font-size: 0.9rem;
                font-weight: 600;
                cursor: pointer;
                transition: background 0.2s;
            }
            .btn-add:hover {
                background: var(--xps-blue-dark);
            }

            /* ─── LEGEND ─── */
            .legend {
                display: flex;
                gap: 16px;
                align-items: center;
                font-size: 0.8rem;
                color: var(--xps-text-muted);
            }
            .legend-item {
                display: flex;
                align-items: center;
                gap: 5px;
            }
            .legend-dot {
                width: 14px;
                height: 14px;
                border-radius: 3px;
            }

            /* ─── MATRIX TABLE ─── */
            .matrix-wrap {
                flex: 1;
                overflow: auto;
                border-radius: 10px;
                border: 1px solid var(--xps-border);
                background: var(--xps-card-bg);
            }
            .matrix-table {
                border-collapse: collapse;
                width: max-content;
                min-width: 100%;
            }
            .matrix-table th,
            .matrix-table td {
                border: 1px solid var(--xps-border);
                text-align: center;
                white-space: nowrap;
            }

            /* Category header row */
            .cat-header th {
                background: var(--xps-charcoal-dark);
                color: var(--xps-blue);
                font-size: 0.7rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 1px;
                padding: 8px 6px;
            }

            /* Skill header row */
            .skill-header th {
                background: var(--xps-charcoal);
                color: var(--xps-text);
                font-size: 0.75rem;
                font-weight: 600;
                padding: 10px 8px;
                cursor: pointer;
                position: relative;
                min-width: 100px;
                transition: background 0.2s;
            }
            .skill-header th:hover {
                background: var(--xps-charcoal-light);
            }
            .skill-header th:first-child {
                cursor: default;
                min-width: 160px;
                text-align: left;
                padding-left: 16px;
            }
            .skill-header th:first-child:hover {
                background: var(--xps-charcoal);
            }
            .skill-header th .expand-icon {
                display: block;
                font-size: 0.6rem;
                color: var(--xps-text-muted);
                margin-top: 2px;
            }

            /* Name cell */
            .name-cell {
                text-align: left !important;
                padding: 6px 12px !important;
                font-weight: 600;
                font-size: 0.85rem;
                background: var(--xps-card-bg);
                position: relative;
                min-width: 160px;
            }
            .name-cell .member-name {
                display: inline;
            }
            .name-cell .remove-btn {
                position: absolute;
                right: 6px;
                top: 50%;
                transform: translateY(-50%);
                background: none;
                border: none;
                color: var(--xps-text-muted);
                cursor: pointer;
                font-size: 0.8rem;
                opacity: 0;
                transition: opacity 0.2s;
                padding: 2px 6px;
                border-radius: 3px;
            }
            .name-cell:hover .remove-btn {
                opacity: 1;
            }
            .name-cell .remove-btn:hover {
                color: var(--xps-danger);
                background: rgba(244, 67, 54, 0.15);
            }

            /* Level cells */
            .level-cell {
                padding: 6px 4px !important;
                cursor: pointer;
                transition: all 0.15s;
                min-width: 100px;
            }
            .level-cell:hover {
                filter: brightness(1.15);
            }
            .level-cell .level-badge {
                display: inline-block;
                padding: 3px 10px;
                border-radius: 4px;
                font-size: 0.75rem;
                font-weight: 600;
                min-width: 90px;
            }
            .level-cell[data-level="0"] {
                background: transparent;
            }
            .level-cell[data-level="0"] .level-badge {
                background: rgba(255, 255, 255, 0.03);
                color: var(--xps-text-muted);
                border: 1px dashed var(--xps-border);
            }
            .level-cell[data-level="1"] {
                background: rgba(92, 107, 192, 0.1);
            }
            .level-cell[data-level="1"] .level-badge {
                background: var(--level-1);
                color: #fff;
            }
            .level-cell[data-level="2"] {
                background: rgba(38, 166, 154, 0.1);
            }
            .level-cell[data-level="2"] .level-badge {
                background: var(--level-2);
                color: #fff;
            }
            .level-cell[data-level="3"] {
                background: rgba(255, 152, 0, 0.1);
            }
            .level-cell[data-level="3"] .level-badge {
                background: var(--level-3);
                color: #fff;
            }
            .level-cell[data-level="4"] {
                background: rgba(239, 83, 80, 0.1);
            }
            .level-cell[data-level="4"] .level-badge {
                background: var(--level-4);
                color: #fff;
            }

            /* Average row */
            .avg-row td {
                background: var(--xps-charcoal-dark) !important;
                font-weight: 600;
                font-size: 0.8rem;
                padding: 8px 4px !important;
                color: var(--xps-text-muted);
            }
            .avg-row td:first-child {
                text-align: left !important;
                padding-left: 16px !important;
            }

            /* ─── DETAIL PANEL ─── */
            .detail-overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.6);
                z-index: 200;
                justify-content: center;
                align-items: center;
                padding: 40px;
            }
            .detail-overlay.open {
                display: flex;
            }
            .detail-panel {
                background: var(--xps-card-bg);
                border: 1px solid var(--xps-border);
                border-radius: 12px;
                max-width: 640px;
                width: 100%;
                max-height: 80vh;
                overflow-y: auto;
                padding: 32px;
            }
            .detail-panel h2 {
                font-size: 1.2rem;
                color: var(--xps-blue);
                margin-bottom: 4px;
            }
            .detail-panel .detail-category {
                font-size: 0.75rem;
                color: var(--xps-text-muted);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 20px;
            }
            .detail-panel h3 {
                font-size: 0.85rem;
                color: var(--xps-text);
                margin: 16px 0 8px;
                padding-bottom: 4px;
                border-bottom: 1px solid var(--xps-border);
            }
            .detail-panel p,
            .detail-panel li {
                font-size: 0.85rem;
                color: var(--xps-text-muted);
                line-height: 1.6;
            }
            .detail-panel ul {
                padding-left: 20px;
            }
            .detail-panel li {
                margin-bottom: 4px;
            }
            .level-desc {
                display: flex;
                gap: 10px;
                align-items: flex-start;
                margin-bottom: 8px;
            }
            .level-desc .level-tag {
                flex-shrink: 0;
                padding: 2px 8px;
                border-radius: 4px;
                font-size: 0.7rem;
                font-weight: 700;
                color: #fff;
                min-width: 80px;
                text-align: center;
            }
            .level-desc p {
                margin: 0;
            }
            .detail-close {
                float: right;
                background: none;
                border: 1px solid var(--xps-border);
                color: var(--xps-text-muted);
                width: 32px;
                height: 32px;
                border-radius: 6px;
                cursor: pointer;
                font-size: 1.1rem;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.2s;
            }
            .detail-close:hover {
                color: var(--xps-danger);
                border-color: var(--xps-danger);
            }

            /* ─── EMPTY STATE ─── */
            .empty-state {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 60px 20px;
                color: var(--xps-text-muted);
                text-align: center;
            }
            .empty-state svg {
                margin-bottom: 16px;
                opacity: 0.3;
            }
            .empty-state p {
                font-size: 0.95rem;
            }
            .empty-state .hint {
                font-size: 0.8rem;
                margin-top: 8px;
            }
        </style>
        <script src="skills-config.js"></script>
    </head>
    <body>
        <!-- HEADER -->
        <div class="header-bar">
            <div class="logo-container">
                <svg
                    viewBox="0 0 50 50"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <polygon
                        points="5,8 20,25 5,42 12,42 25,29 25,25 12,8"
                        fill="#4A9FD9"
                    />
                    <polygon
                        points="45,8 38,8 25,21 25,25 38,42 45,42 30,25"
                        fill="#4A9FD9"
                    />
                    <polygon points="25,21 25,29 30,25 25,21" fill="#3D8BBF" />
                </svg>
                <span class="logo-text"><strong>XPS</strong> Group</span>
                <div class="logo-divider"></div>
                <span class="app-title" id="appTitle"></span>
            </div>
            <div class="header-actions">
                <div class="profile-toggle" id="profileToggle"></div>
                <div class="logo-divider"></div>
                <button
                    class="header-btn"
                    onclick="exportCSV()"
                    title="Export as CSV"
                >
                    Export CSV
                </button>
                <button
                    class="header-btn"
                    onclick="document.getElementById('csvImport').click()"
                    title="Import from CSV"
                >
                    Import CSV
                </button>
                <input
                    type="file"
                    id="csvImport"
                    accept=".csv"
                    style="display: none"
                    onchange="importCSV(this)"
                />
                <button
                    class="header-btn"
                    onclick="document.getElementById('jsonImport').click()"
                    title="Import individual assessment JSON files"
                >
                    Import JSON
                </button>
                <input
                    type="file"
                    id="jsonImport"
                    accept=".json"
                    multiple
                    style="display: none"
                    onchange="importJSON(this)"
                />
                <button
                    class="header-btn danger"
                    onclick="resetAll()"
                    title="Clear all data"
                >
                    Reset
                </button>
                <div class="logo-divider"></div>
                <div class="theme-toggle">
                    <button class="active" onclick="setTheme('dark')">
                        Dark
                    </button>
                    <button onclick="setTheme('light')">Light</button>
                </div>
            </div>
        </div>

        <!-- MAIN -->
        <div class="app-container">
            <div class="toolbar">
                <input
                    type="text"
                    id="memberInput"
                    onkeydown="if (event.key === 'Enter') addMember();"
                />
                <button
                    class="btn-add"
                    onclick="addMember()"
                    id="addMemberBtn"
                ></button>
                <div style="flex: 1"></div>
                <div class="legend" id="legend"></div>
            </div>

            <div class="matrix-wrap" id="matrixWrap">
                <!-- Table or empty state rendered here -->
            </div>
        </div>

        <!-- DETAIL OVERLAY -->
        <div
            class="detail-overlay"
            id="detailOverlay"
            onclick="if (event.target === this) closeDetail();"
        >
            <div class="detail-panel" id="detailPanel"></div>
        </div>

        <script>
            // ─── DERIVED FROM skills-config.js ───
            const LEVEL_LABELS = LEVELS.map((l) => l.label);
            const LEVEL_COLORS = LEVELS.map((l) => l.color);
            const NUM_LEVELS = LEVELS.length - 1;

            // ─── APPLY UI TEXT FROM CONFIG ───
            document.getElementById("appTitle").textContent = UI_TEXT.appTitle;
            document.getElementById("memberInput").placeholder =
                UI_TEXT.memberInputPlaceholder;
            document.getElementById("addMemberBtn").textContent =
                UI_TEXT.addMemberButton;

            // Build legend dynamically from LEVELS config
            (function () {
                const legend = document.getElementById("legend");
                legend.innerHTML =
                    '<span style="color: var(--xps-text-muted); font-weight: 600">Levels:</span>';
                for (let i = 1; i < LEVELS.length; i++) {
                    const item = document.createElement("div");
                    item.className = "legend-item";
                    item.innerHTML = `<div class="legend-dot" style="background: ${LEVELS[i].color}"></div> ${i} ${LEVELS[i].label}`;
                    legend.appendChild(item);
                }
            })();

            // ─── PROFILE KEY (namespaces localStorage per profile) ───
            const PROFILE = new URLSearchParams(window.location.search).get("profile") || "coder";
            const STORAGE_KEY = "skillsMatrix_" + PROFILE;

            // Build profile toggle
            (function () {
                const profiles = [
                    { key: "coder", label: "Coders" },
                    { key: "analyst", label: "Analysts" },
                ];
                const toggle = document.getElementById("profileToggle");
                for (const p of profiles) {
                    const btn = document.createElement("button");
                    btn.textContent = p.label;
                    if (p.key === PROFILE) btn.classList.add("active");
                    btn.onclick = function () {
                        if (p.key === PROFILE) return;
                        const url = new URL(window.location);
                        url.searchParams.set("profile", p.key);
                        window.location.href = url.toString();
                    };
                    toggle.appendChild(btn);
                }
            })();

            // ─── STATE ───
            let state = loadState();

            function loadState() {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) return JSON.parse(saved);
                } catch (e) {}
                return { members: [], ratings: {} };
            }

            function saveState() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            }

            // ─── THEME ───
            function setTheme(t) {
                if (t === "light")
                    document.documentElement.setAttribute(
                        "data-theme",
                        "light",
                    );
                else document.documentElement.removeAttribute("data-theme");
                document
                    .querySelectorAll(".theme-toggle button")
                    .forEach((b) => b.classList.remove("active"));
                document
                    .querySelector(
                        `.theme-toggle button:${t === "dark" ? "first" : "last"}-child`,
                    )
                    .classList.add("active");
                localStorage.setItem("skillsMatrixTheme", t);
            }
            (function () {
                const t = localStorage.getItem("skillsMatrixTheme");
                if (t) setTheme(t);
            })();

            // ─── MEMBERS ───
            function addMember() {
                const input = document.getElementById("memberInput");
                const name = input.value.trim();
                if (!name) return;
                if (state.members.includes(name)) {
                    input.value = "";
                    return;
                }
                state.members.push(name);
                saveState();
                input.value = "";
                render();
            }

            function removeMember(name) {
                if (!confirm(`Remove ${name} from the matrix?`)) return;
                state.members = state.members.filter((m) => m !== name);
                Object.keys(state.ratings).forEach((k) => {
                    if (k.startsWith(name + "|")) delete state.ratings[k];
                });
                saveState();
                render();
            }

            // ─── RATINGS ───
            function cycleRating(member, skillId) {
                const key = member + "|" + skillId;
                const current = state.ratings[key] || 0;
                state.ratings[key] = (current + 1) % (NUM_LEVELS + 1);
                saveState();
                render();
            }

            function getRating(member, skillId) {
                return state.ratings[member + "|" + skillId] || 0;
            }

            // ─── DETAIL PANEL ───
            function showDetail(skillId) {
                let skill = null,
                    cat = null;
                for (const c of SKILLS) {
                    for (const s of c.skills) {
                        if (s.id === skillId) {
                            skill = s;
                            cat = c.category;
                            break;
                        }
                    }
                    if (skill) break;
                }
                if (!skill) return;

                const h = UI_TEXT.detailHeadings;
                const panel = document.getElementById("detailPanel");
                panel.innerHTML = `
                    <button class="detail-close" onclick="closeDetail()">&times;</button>
                    <h2>${skill.name}</h2>
                    <div class="detail-category">${cat}</div>
                    <h3>${h.description}</h3>
                    <p>${skill.description}</p>
                    <h3>${h.levels}</h3>
                    ${skill.levels
                        .map(
                            (desc, i) => `
                        <div class="level-desc">
                            <span class="level-tag" style="background:${LEVEL_COLORS[i + 1]}">${LEVEL_LABELS[i + 1]}</span>
                            <p>${desc}</p>
                        </div>
                    `,
                        )
                        .join("")}
                    <h3>${h.improve}</h3>
                    <ul>
                        ${skill.improve
                            .map(
                                (tip, i) =>
                                    `<li><strong>${LEVEL_LABELS[i + 1]}→${LEVEL_LABELS[Math.min(i + 2, NUM_LEVELS)]}:</strong> ${tip}</li>`,
                            )
                            .join("")}
                    </ul>
                `;
                document.getElementById("detailOverlay").classList.add("open");
            }

            function closeDetail() {
                document
                    .getElementById("detailOverlay")
                    .classList.remove("open");
            }

            // ─── RENDER ───
            function render() {
                const wrap = document.getElementById("matrixWrap");

                if (state.members.length === 0) {
                    wrap.innerHTML = `
                        <div class="empty-state">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                <circle cx="9" cy="7" r="4"/>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                            </svg>
                            <p>${UI_TEXT.emptyStateTitle}</p>
                            <p class="hint">${UI_TEXT.emptyStateHint}</p>
                        </div>
                    `;
                    return;
                }

                const allSkills = SKILLS.flatMap((c) => c.skills);

                let html = '<table class="matrix-table">';

                // Category header row
                html += '<tr class="cat-header"><th></th>';
                for (const cat of SKILLS) {
                    html += `<th colspan="${cat.skills.length}">${cat.category}</th>`;
                }
                html += "</tr>";

                // Skill header row
                html += `<tr class="skill-header"><th>${UI_TEXT.teamMemberColumn}</th>`;
                for (const skill of allSkills) {
                    html += `<th onclick="showDetail('${skill.id}')">${skill.name}<span class="expand-icon">${UI_TEXT.skillHeaderHint}</span></th>`;
                }
                html += "</tr>";

                // Member rows
                for (const member of state.members) {
                    html += "<tr>";
                    html += `<td class="name-cell">
                        <span class="member-name">${escHtml(member)}</span>
                        <button class="remove-btn" onclick="removeMember('${escJs(member)}')" title="Remove member">&times;</button>
                    </td>`;
                    for (const skill of allSkills) {
                        const level = getRating(member, skill.id);
                        html += `<td class="level-cell" data-level="${level}" onclick="cycleRating('${escJs(member)}','${skill.id}')">
                            <span class="level-badge">${LEVEL_LABELS[level]}</span>
                        </td>`;
                    }
                    html += "</tr>";
                }

                // Average row
                if (state.members.length > 1) {
                    html += `<tr class="avg-row"><td>${UI_TEXT.teamAverageLabel}</td>`;
                    for (const skill of allSkills) {
                        const ratings = state.members
                            .map((m) => getRating(m, skill.id))
                            .filter((r) => r > 0);
                        const avg = ratings.length
                            ? (
                                  ratings.reduce((a, b) => a + b, 0) /
                                  ratings.length
                              ).toFixed(1)
                            : "—";
                        html += `<td>${avg}</td>`;
                    }
                    html += "</tr>";
                }

                html += "</table>";
                wrap.innerHTML = html;
            }

            // ─── EXPORT ───
            function exportCSV() {
                const allSkills = SKILLS.flatMap((c) => c.skills);
                let csv =
                    UI_TEXT.teamMemberColumn +
                    "," +
                    allSkills.map((s) => `"${s.name}"`).join(",") +
                    "\n";
                for (const member of state.members) {
                    csv +=
                        `"${member}",` +
                        allSkills
                            .map((s) => {
                                const r = getRating(member, s.id);
                                return r > 0
                                    ? `${r} - ${LEVEL_LABELS[r]}`
                                    : "";
                            })
                            .join(",") +
                        "\n";
                }
                const blob = new Blob([csv], { type: "text/csv" });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = UI_TEXT.exportFilename;
                a.click();
            }

            // ─── IMPORT JSON (individual assessments) ───
            function importJSON(input) {
                const files = Array.from(input.files);
                if (!files.length) return;
                let imported = 0;
                const skipped = [];

                let loaded = 0;
                for (const file of files) {
                    const reader = new FileReader();
                    reader.onload = function (e) {
                        try {
                            const data = JSON.parse(e.target.result);
                            const name = (data.name || "").trim();
                            if (!name) return;

                            // Check profile matches
                            const fileProfile = data.profile || "coder";
                            if (fileProfile !== PROFILE) {
                                skipped.push(
                                    `${name} (${fileProfile} profile)`,
                                );
                                loaded++;
                                if (loaded === files.length) finishImport();
                                return;
                            }

                            if (!state.members.includes(name))
                                state.members.push(name);

                            if (data.ratings) {
                                for (const [skillId, val] of Object.entries(
                                    data.ratings,
                                )) {
                                    const level =
                                        typeof val === "object"
                                            ? val.level
                                            : val;
                                    if (level >= 1 && level <= NUM_LEVELS) {
                                        state.ratings[name + "|" + skillId] =
                                            level;
                                    }
                                }
                            }
                            imported++;
                        } catch (err) {
                            console.warn("Failed to parse " + file.name, err);
                        }

                        loaded++;
                        if (loaded === files.length) finishImport();
                    };

                    function finishImport() {
                        saveState();
                        render();
                        let msg = `Imported ${imported} assessment${imported !== 1 ? "s" : ""}.`;
                        if (skipped.length) {
                            msg +=
                                `\n\nSkipped ${skipped.length} file${skipped.length !== 1 ? "s" : ""} (wrong profile for this view):\n` +
                                skipped.join("\n") +
                                `\n\nSwitch to the correct profile view to import ${skipped.length === 1 ? "it" : "them"}.`;
                        }
                        alert(msg);
                    }
                    reader.readAsText(file);
                }
                input.value = "";
            }

            // ─── IMPORT CSV ───
            function importCSV(input) {
                const file = input.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function (e) {
                    const rows = parseCSV(e.target.result);
                    if (rows.length < 2) {
                        alert(
                            "CSV must have a header row and at least one data row.",
                        );
                        return;
                    }

                    const allSkills = SKILLS.flatMap((c) => c.skills);
                    const headers = rows[0];

                    const colMap = [];
                    for (let i = 1; i < headers.length; i++) {
                        const h = headers[i].trim().toLowerCase();
                        const match = allSkills.find(
                            (s) => s.name.toLowerCase() === h,
                        );
                        colMap.push(match ? match.id : null);
                    }

                    let imported = 0;
                    for (let r = 1; r < rows.length; r++) {
                        const cols = rows[r];
                        const name = (cols[0] || "").trim();
                        if (
                            !name ||
                            name.toLowerCase() ===
                                UI_TEXT.teamAverageLabel.toLowerCase()
                        )
                            continue;

                        if (!state.members.includes(name))
                            state.members.push(name);

                        for (let i = 1; i < cols.length; i++) {
                            const skillId = colMap[i - 1];
                            if (!skillId) continue;
                            const val = (cols[i] || "").trim();
                            let level = 0;
                            if (val) {
                                const numMatch = val.match(/^(\d)/);
                                if (numMatch) {
                                    level = parseInt(numMatch[1]);
                                } else {
                                    const idx = LEVEL_LABELS.findIndex(
                                        (l) =>
                                            l.toLowerCase() ===
                                            val.toLowerCase(),
                                    );
                                    if (idx > 0) level = idx;
                                }
                            }
                            if (level >= 1 && level <= NUM_LEVELS)
                                state.ratings[name + "|" + skillId] = level;
                        }
                        imported++;
                    }

                    saveState();
                    render();
                    alert(
                        `Imported ${imported} team member${imported !== 1 ? "s" : ""}.`,
                    );
                };
                reader.readAsText(file);
                input.value = "";
            }

            function parseCSV(text) {
                const rows = [];
                let current = [];
                let field = "";
                let inQuotes = false;
                for (let i = 0; i < text.length; i++) {
                    const ch = text[i];
                    if (inQuotes) {
                        if (ch === '"' && text[i + 1] === '"') {
                            field += '"';
                            i++;
                        } else if (ch === '"') {
                            inQuotes = false;
                        } else {
                            field += ch;
                        }
                    } else {
                        if (ch === '"') {
                            inQuotes = true;
                        } else if (ch === ",") {
                            current.push(field);
                            field = "";
                        } else if (
                            ch === "\n" ||
                            (ch === "\r" && text[i + 1] === "\n")
                        ) {
                            current.push(field);
                            field = "";
                            if (current.some((c) => c.trim()))
                                rows.push(current);
                            current = [];
                            if (ch === "\r") i++;
                        } else {
                            field += ch;
                        }
                    }
                }
                current.push(field);
                if (current.some((c) => c.trim())) rows.push(current);
                return rows;
            }

            // ─── RESET ───
            function resetAll() {
                if (
                    !confirm(
                        "This will clear all team members and ratings. Are you sure?",
                    )
                )
                    return;
                state = { members: [], ratings: {} };
                saveState();
                render();
            }

            // ─── UTILS ───
            function escHtml(s) {
                return s
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;");
            }
            function escJs(s) {
                return s.replace(/\\/g, "\\\\").replace(/'/g, "\\'");
            }

            // ─── KEYBOARD ───
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") closeDetail();
            });

            // ─── INIT ───
            render();
        </script>
    </body>
</html>
